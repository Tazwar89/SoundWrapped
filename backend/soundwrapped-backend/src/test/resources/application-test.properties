# Test profile (isolated, no Docker needed)
spring.application.name=SoundWrappedTest

# Database configuration - Postgres-only (Testcontainers)
# Environment variables take precedence if set (e.g., in CI/CD)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:15:///soundwrapped}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.testcontainers.jdbc.ContainerDatabaseDriver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}

# Hibernate SQL logging (optional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# SoundCloud API configuration (required for ApplicationContext to load)
soundcloud.client-id=test-client-id
soundcloud.client-secret=test-client-secret
soundcloud.api.base-url=https://api.soundcloud.com